# Local addition (not in upstream linux-msm/dsp-binaries conf.d): map the
# Lemans EVK board model to the SA8775P-RIDE DSP library path. The FastRPC
# runtime matches the DT model string (/proc/device-tree/model) against these
# keys to pick DSP_LIBRARY_PATH (relative to /usr/share/qcom).
#
# Verify the model string on target with:  cat /proc/device-tree/model
# and adjust the key below if the lemans-evk(-el2) DTB reports something else.
machines:
  Qualcomm Technologies, Inc. Lemans EVK:
    DSP_LIBRARY_PATH: sa8775p/Qualcomm/SA8775P-RIDE/dsp
